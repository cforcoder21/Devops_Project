# Nagios host and service definitions for Incident Post-Mortem Generator

define host {
    use                     linux-server
    host_name               postmortem-app
    alias                   Incident Post-Mortem Generator
    address                 postmortem_app
    check_command           check-host-alive
    max_check_attempts      3
    check_period            24x7
    notification_interval   60
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               postmortem-app
    service_description     HTTP Health Check
    check_command           check_http!-p 8080 -u /health
    check_interval          2
    retry_interval          1
    max_check_attempts      3
    notification_interval   30
}

define service {
    use                     generic-service
    host_name               postmortem-app
    service_description     API Incidents Endpoint
    check_command           check_http!-p 8080 -u /api/incidents
    check_interval          5
    retry_interval          2
    max_check_attempts      3
}

define service {
    use                     generic-service
    host_name               postmortem-app
    service_description     PostgreSQL Database
    check_command           check_tcp!5432
    check_interval          2
    retry_interval          1
    max_check_attempts      3
}
