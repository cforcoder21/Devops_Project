version: '3.8'

services:
  app:
    build: .
    image: devops-project-incident-postmortem:latest
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DATABASE_URL=postgresql://devopsuser:devopspass@db:5432/postmortemdb
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=postmortemdb
      - POSTGRES_USER=devopsuser
      - POSTGRES_PASSWORD=devopspass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  monitoring:
    image: nagios/nagios:latest
    ports:
      - "8081:80"
    volumes:
      - ./monitoring/nagios:/opt/nagios/etc

volumes:
  postgres_data:
